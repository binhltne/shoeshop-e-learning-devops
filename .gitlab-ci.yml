variables:
  projectname: shoe-ShoppingCart
  version: 0.0.1-SNAPSHOT
  projectuser: shoeshop
  projectpath: /datas/shoeshop

stages:
  - build
  - deploy

build:
  stage: build
  variables:
    GIT_STRATEGY: clone
  script:
    - mvn install -DskipTests
  tags:
    - devopslab

deploy:
  stage: deploy
  script:
    - sudo cp target/$projectname-$version.jar $projectpath
    - sudo chown -R $projectuser: $projectpath
    - sudo pkill -f "$projectname" || true
    - sudo -u $projectuser bash -c "cd $projectpath && nohup java -jar $projectname-$version.jar >/tmp/app.log 2>&1 &"
  tags:
    - devopslab